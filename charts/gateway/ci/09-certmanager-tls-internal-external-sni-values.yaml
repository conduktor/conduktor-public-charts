nameOverride: gw-09

gateway:
  replicas: 1
  preview:
    listeners: true
  securityMode: "GATEWAY_MANAGED"
  listeners:
    internal:
      securityProtocol: SASL_SSL
      routing: sni
      ports:
        - "9092"
      brokerIds:
        - "0-2"
    external:
      securityProtocol: SASL_SSL
      routing: sni
      ports:
        - "19092"
      advertisedHost: "kafka.example.com"
      advertisedHostPattern: "broker-{{nodeId}}.kafka.example.com"
      bootstrapHostPattern: "bootstrap.kafka.example.com"
      sslClientAuth: "NONE"
  env:
    KAFKA_BOOTSTRAP_SERVERS: kafka.ct-gateway-deps.svc.cluster.local:9092
    GATEWAY_CLUSTER_ID: "gw-09"
    GATEWAY_SSL_KEY_STORE_PASSWORD: "conduktor"
    GATEWAY_SSL_KEY_PASSWORD: "conduktor"
  extraSecretEnvVars:
    - name: GATEWAY_LICENSE_KEY
      valueFrom:
        secretKeyRef:
          name: gateway-license
          key: GATEWAY_LICENSE_KEY

  securityContext:
    capabilities:
      drop:
        - ALL
    readOnlyRootFilesystem: true
    runAsNonRoot: true
    runAsUser: 1000

  volumes:
    - name: tmp
      emptyDir: {}
  volumeMounts:
    - name: tmp
      mountPath: /tmp

podSecurityContext:
  runAsNonRoot: true

tls:
  certManager:
    enabled: true
    issuerRef:
      name: selfsigned-cluster-issuer
      kind: ClusterIssuer
    sslContextRefreshMinutes: 5
    truststore:
      enabled: false  # Kafka in CI is PLAINTEXT; truststore sets GATEWAY_SSL_TRUST_STORE_* which forces SSL upstream
    httpsAdminApi:
      enabled: true


service:
  external:
    enable: true
    type: LoadBalancer
    admin: true
    annotations:
      external-dns.alpha.kubernetes.io/hostname: "kafka.example.com"
