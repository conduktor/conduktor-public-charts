nameOverride: gateway-test-02

gateway:
  replicas: 1
  admin:
    port: 8888

  # Multi-listener config covering both internal (in-cluster) and external (LoadBalancer) listeners.
  listeners:
    internal:
      securityProtocol: PLAINTEXT
      routing: port
      ports:
        - "19092-19094"
    external:
      securityProtocol: PLAINTEXT
      routing: port
      ports:
        - "9092-9094"
      advertisedHost: "gateway.private"

  env:
    KAFKA_BOOTSTRAP_SERVERS: kafka.ct-gateway-deps.svc.cluster.local:9092
    GATEWAY_CLUSTER_ID: "gw-02"
  extraSecretEnvVars:
    - name: GATEWAY_LICENSE_KEY
      valueFrom:
        secretKeyRef:
          name: gateway-license
          key: GATEWAY_LICENSE_KEY

service:
  external:
    enable: true
    type: LoadBalancer
    admin: true
    extraSpecs:
      externalTrafficPolicy: Local

  internal:
    extraSpecs:
      trafficDistribution: PreferClose

ingress:
  enabled: true
  ingressClassName: "nginx"
  hostname: gateway.private
  tls: true
  selfSigned: true
