apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "conduktor-gateway.fullname" . }}
  labels: {{ include "conduktor-gateway.labels" . | nindent 4 }}
  annotations:
    {{- with .Values.commonAnnotations }}
    {{- include "common.tplvalues.render" ( dict "value" . "context" $ ) | nindent 4 }}
    {{- end }}
spec:
  selector:
    matchLabels: {{ include "conduktor-gateway.podSelectorLabels" . | nindent 6 }}
  replicas: {{ .Values.gateway.replicas }}
  strategy:
    type: RollingUpdate
  template:
    metadata:
      annotations:
        {{- with .Values.commonAnnotations }}
        {{- include "common.tplvalues.render" ( dict "value" . "context" $ ) | nindent 8 }}
        {{- end }}
        {{- with .Values.gateway.podAnnotations }}
        {{- include "common.tplvalues.render" (dict "value" . "context" $) | nindent 8 }}
        {{- end }}
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        checksum/self-secrets: {{ include (print $.Template.BasePath "/secrets.yaml") . | sha256sum }}
        {{- if .Values.gateway.secretSha256sum }}
        checksum/secret: {{ .Values.gateway.secretSha256sum }}
        {{- end }}
      labels: {{- include "conduktor-gateway.labels" . | nindent 8 }}
        {{- with .Values.gateway.podLabels }}
        {{- include "common.tplvalues.render" (dict "value" . "context" $) | nindent 8 }}
        {{- end }}
    spec:
      {{- if .Values.gateway.terminationGracePeriodSeconds }}
      terminationGracePeriodSeconds: {{ .Values.gateway.terminationGracePeriodSeconds }}
      {{- end }}
      {{- if .Values.tls.certManager.enabled }}
      {{/* Set a deterministic pod hostname so Gateway can locate its own SAN entry in the mounted JKS keystore.
           Without this the pod hostname is a random suffix that doesn't appear in the cert SANs derived at
           template time, causing Gateway to fail SSL context initialisation. */}}
      hostname: {{ include "conduktor-gateway.fullname" . }}
      {{- end }}
      initContainers:
        {{- if .Values.gateway.initContainers }}
          {{- include "common.tplvalues.render" (dict "value" .Values.gateway.initContainers "context" $) | nindent 8 }}
        {{- end }}
      containers:
        - name: gateway
          image: {{ include "common.images.image" (dict "imageRoot" .Values.gateway.image "global" .Values.global "chart" .Chart) }}
          imagePullPolicy: {{ .Values.gateway.image.pullPolicy }}
          env:
            # Static env var to be reconsidered if we offer env way to configure them
            - name: GATEWAY_INTERCEPTOR_CONFIG_LOCATION
              value: /etc/gateway/config/interceptors.json
            - name: GATEWAY_HTTP_PORT
              value: {{ .Values.gateway.admin.port | quote }}
            {{- if .Values.gateway.jmx.enable }}
            - name: JAVA_TOOL_OPTIONS
              value: {{ tpl .Values.gateway.jmx.jvmArgs . | quote }}
            {{- end}}
            {{- if eq (include "conduktor-gateway.envExists" (dict "envkey" "GATEWAY_SECURED_METRICS" "context" $)) "false" }}
            - name: GATEWAY_SECURED_METRICS
              value: {{ .Values.gateway.admin.securedMetrics | quote }}
            {{- end}}
            {{- $tlsVars := include "conduktor-gateway.tlsEnvVars" . | fromJson }}
            {{- range $name, $value := $tlsVars }}
            {{- if kindIs "map" $value }}
            - name: {{ $name }}
              valueFrom: {{ $value | toYaml | nindent 16 }}
            {{- else }}
            - name: {{ $name }}
              value: {{ $value | quote }}
            {{- end }}
            {{- end }}
            {{- if eq (include "conduktor-gateway.envExists" (dict "envkey" "GATEWAY_FEATURE_FLAGS_INTERNAL_LOAD_BALANCING" "context" $)) "false" }}
            - name: GATEWAY_FEATURE_FLAGS_INTERNAL_LOAD_BALANCING
              value: "false"
            {{- end }}
            {{- if eq (include "conduktor-gateway.useLegacyPortRange" .) "true" }}
            {{- $modeVars := include "conduktor-gateway.singleListenerModeEnvVars" . | fromJson }}
            {{- range $name, $value := $modeVars }}
            - name: {{ $name }}
              value: {{ $value | quote }}
            {{- end }}
            {{- else }}
            {{- $modeVars := include "conduktor-gateway.listenerModeEnvVars" . | fromJson }}
            {{- range $name, $value := $modeVars }}
            - name: {{ $name }}
              value: {{ $value | quote }}
            {{- end }}
            {{- end }}{{/* end if/else legacy portRange mode */}}
            {{- if .Values.gateway.extraSecretEnvVars }}
            {{- toYaml .Values.gateway.extraSecretEnvVars | nindent 12 }}
            {{- end }}
            - name: DEPLOYED_BY
              value: HelmChart/{{ .Chart.Version }}
          envFrom:
            - configMapRef:
                name: {{ include "conduktor-gateway.fullname" . }}
            - secretRef:
                name: {{ include "conduktor-gateway.secretName" . }}
          ports:
            {{- if eq (include "conduktor-gateway.useLegacyPortRange" .) "true" }}
            {{- range untilStep (int .Values.gateway.portRange.start) (int (add .Values.gateway.portRange.start .Values.gateway.portRange.count)) 1 }}
            - containerPort: {{ . }}
              protocol: TCP
            {{- end }}
            {{- else }}
            {{- $internalPorts := include "conduktor-gateway.portPairsJson" .Values.gateway.listeners.internal.ports | fromJson }}
            {{- range $internalPorts.pairs }}
            - containerPort: {{ .local }}
              protocol: TCP
            {{- end }}
            {{- if .Values.service.external.enable }}
            {{- $externalPorts := include "conduktor-gateway.portPairsJson" .Values.gateway.listeners.external.ports | fromJson }}
            {{- range $externalPorts.pairs }}
            - containerPort: {{ .local }}
              protocol: TCP
            {{- end }}
            {{- end }}
            {{- end }}
            - name: admin-http
              containerPort: {{ .Values.gateway.admin.port }}
              protocol: TCP
            {{- if .Values.gateway.jmx.enable }}
            - name: jmx
              containerPort: {{ .Values.gateway.jmx.port }}
              protocol: TCP
            {{- end }}
          volumeMounts:
            {{- with .Values.gateway.volumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
            {{- if or (and .Values.tls.enable (include "conduktor-gateway.keystoreSecretRef" .)) .Values.tls.certManager.enabled }}
            - name: keystore
              mountPath: /etc/gateway/tls/
              readOnly: true
            {{- end }}
            {{- if and .Values.tls.truststore.secretRef (not (and .Values.tls.certManager.enabled .Values.tls.certManager.truststore.enabled)) }}
            - name: truststore
              mountPath: /etc/gateway/truststore/
              readOnly: true
            {{- end }}
            - name: config
              mountPath: /etc/gateway/config
          {{- if .Values.gateway.customStartupProbe }}
          startupProbe: {{- include "common.tplvalues.render" (dict "value" .Values.gateway.customStartupProbe "context" $) | nindent 12 }}
          {{- else if (.Values.gateway.startupProbe).enabled | default true }}
          startupProbe:
          {{- if .Values.gateway.startupProbe }}
          {{- include "common.tplvalues.render" (dict "value" (omit .Values.gateway.startupProbe "enabled") "context" $) | nindent 12 }}
          {{- end }}
            httpGet:
              path: /health/live
              port: {{ .Values.gateway.admin.port }}
              scheme: {{ include "conduktor-gateway.adminAPIScheme" . | upper | quote }}
          {{- end }}
          {{- if .Values.gateway.customLivenessProbe }}
          livenessProbe: {{- include "common.tplvalues.render" (dict "value" .Values.gateway.customLivenessProbe "context" $) | nindent 12 }}
          {{- else if (.Values.gateway.livenessProbe).enabled | default true }}
          livenessProbe:
          {{- if .Values.gateway.livenessProbe }}
          {{- include "common.tplvalues.render" (dict "value" (omit .Values.gateway.livenessProbe "enabled") "context" $) | nindent 12 }}
          {{- end }}
            httpGet:
              path: /health/live
              port: {{ .Values.gateway.admin.port }}
              scheme: {{ include "conduktor-gateway.adminAPIScheme" . | upper | quote }}
          {{- end }}
          {{- if .Values.gateway.customReadinessProbe }}
          readinessProbe: {{- include "common.tplvalues.render" (dict "value" .Values.gateway.customReadinessProbe "context" $) | nindent 12 }}
          {{- else if (.Values.gateway.readinessProbe).enabled | default true }}
          readinessProbe:
          {{- if .Values.gateway.readinessProbe }}
          {{- include "common.tplvalues.render" (dict "value" (omit .Values.gateway.readinessProbe "enabled") "context" $) | nindent 12 }}
          {{- end }}
            httpGet:
              path: /health/ready
              port: {{ .Values.gateway.admin.port }}
              scheme: {{ include "conduktor-gateway.adminAPIScheme" . | upper | quote }}
          {{- end }}
          {{- if .Values.resources }}
          resources: {{- toYaml .Values.resources | nindent 12 }}
          {{- else }}
          resources: {{- toYaml .Values.gateway.resources | nindent 12 }}
          {{- end }}
          {{- with .Values.gateway.securityContext }}
          securityContext: {{- toYaml . | nindent 12 }}
          {{- end }}
        {{- if .Values.gateway.sidecars }}
        {{- include "common.tplvalues.render" ( dict "value" .Values.gateway.sidecars "context" $) | nindent 8 }}
        {{- end }}
      volumes:
        {{- with .Values.gateway.volumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        {{- $keystoreFile := include "conduktor-gateway.keystoreFile" . }}
        {{- if or .Values.tls.enable .Values.tls.certManager.enabled }}
        - name: keystore
          secret:
            secretName: {{ if .Values.tls.certManager.enabled -}}
              {{ include "conduktor-gateway.fullname" . }}-tls
            {{- else -}}
              {{ required "tls.keystore.secretRef (or deprecated tls.secretRef) is required when tls.enable is true" (include "conduktor-gateway.keystoreSecretRef" .) }}
            {{- end }}
            items:
            - key: {{ if .Values.tls.certManager.enabled }}keystore.jks{{ else }}{{ include "conduktor-gateway.keystoreKey" . }}{{ end }}
              path: {{ $keystoreFile }}
            {{- if and .Values.tls.certManager.enabled .Values.tls.certManager.truststore.enabled }}
            - key: truststore.jks
              path: {{ .Values.tls.truststore.keystoreFile }}
            {{- end }}
        {{- end }}
        {{- if and .Values.tls.truststore.secretRef (not (and .Values.tls.certManager.enabled .Values.tls.certManager.truststore.enabled)) }}
        - name: truststore
          secret:
            secretName: {{ .Values.tls.truststore.secretRef }}
            items:
            - key: {{ .Values.tls.truststore.keystoreKey }}
              path: {{ .Values.tls.truststore.keystoreFile }}
        {{- end }}
        - name: config
          configMap:
            name: {{ include "conduktor-gateway.fullname" . }}
            items:
            - key: interceptors.json
              path: interceptors.json
      serviceAccountName: {{ template "conduktor-gateway.serviceAccountName" . }}
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets: {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.podSecurityContext }}
      securityContext: {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector: {{- toYaml . | nindent 8 }}
      {{- end }}
      affinity:
        nodeAffinity: {{- include "conduktor-gateway.nodeAffinity" . | nindent 10 }}
        podAffinity: {{- include "conduktor-gateway.podAffinity" . | nindent 10 }}
        podAntiAffinity: {{- include "conduktor-gateway.podAntiAffinity" . | nindent 10 }}
      {{- with .Values.tolerations }}
      tolerations: {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.gateway.priorityClassName }}
      priorityClassName: {{ .Values.gateway.priorityClassName | quote }}
      {{- end }}
