apiVersion: v2
name: provisioner
type: application
version: 0.2.0
appVersion: "v0.7.0"
description: Helm chart to run Conduktor CLI provisioning on Conduktor Plaform
icon: https://cdn.conduktor.io/brand/symbol_lime.svg
home: https://www.conduktor.io
maintainers:
  - name: Conduktor
    email: support@conduktor.io
    url: https://docs.conduktor.io/platform
sources:
  - https://github.com/conduktor/conduktor-public-charts/tree/main/charts/provisioner
dependencies:
  - name: common
    repository: oci://registry-1.docker.io/bitnamicharts
    tags:
      - bitnami-common
    version: 2.x.x
annotations:
  artifacthub.io/license: Apache-2.0
  artifacthub.io/category: streaming-messaging
  artifacthub.io/images: |
    - name: conduktor-ctl
      image: conduktor/conduktor-ctl:v0.7.0
      platforms:
        - linux/amd64
        - linux/arm64
  artifacthub.io/links: |
    - name: Changelog
      url: https://docs.conduktor.io/guide/release-notes
    - name: Documentation
      url: https://docs.conduktor.io 
    - name: support
      url: https://www.conduktor.io/contact/support
  artifacthub.io/screenshots: |
    - title: Deployment architecture
      url: https://docs.conduktor.io/images/deployment-overview.png